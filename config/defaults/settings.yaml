# Market Pipeline - Runtime Settings

# Output configuration
output_base_path: output
max_articles_per_position: 5
max_total_articles: 200

# Summarization
summarization:
  use_ollama: true
  ollama_base_url: http://localhost:11434
  ollama_model: phi3:14
  temperature: 0.3
  max_tokens: 500
  # Fallback to extractive summaries if Ollama is unavailable
  fallback_to_extractive: true

# Scoring weights (tune these to adjust relevance sensitivity)
scoring:
  direct_ticker_bonus: 10.0
  keyword_match_points: 3.0
  theme_match_points: 4.0
  macro_overlap_points: 2.5
  related_term_points: 1.5
  source_priority_factor: 0.1
  recency_max_bonus: 2.0
  recency_decay_hours: 48

# Cache settings
cache:
  enabled: true
  ttl_hours: 12
  directory: data/cache

# Scheduling (used by the API server's built-in scheduler)
schedule:
  run_hour: 6
  run_minute: 30
  timezone: America/New_York

# Logging
logging:
  level: INFO

# Alert thresholds (future use)
alerts:
  high_relevance_threshold: 25.0
  position_concentration_warning: 0.40

# Smart price refresh - on-demand during market hours
price_refresh:
  # Minute offsets within each hour when prices are considered stale.
  # E.g. [1, 31] means prices fetched before :01 or :31 are refreshed
  # on next page load (ensures data ~1 min after market open at 9:30).
  offsets: [1, 31]

  # Named market-hour schedules. Each position maps to one schedule.
  schedules:
    us_equity:
      name: "US Equity (NYSE/NASDAQ/TSX)"
      open: "09:30"
      close: "16:00"
      timezone: "America/New_York"
      days: [0, 1, 2, 3, 4]   # Mon=0 .. Sun=6
    crypto:
      name: "Cryptocurrency (24/7)"
      open: "00:00"
      close: "23:59"
      timezone: "UTC"
      days: [0, 1, 2, 3, 4, 5, 6]

  # Schedule assigned to tickers that aren't crypto
  default_schedule: us_equity

  # Currencies treated as crypto (mapped to 'crypto' schedule automatically)
  crypto_currencies:
    - BTC
    - ETH
    - SOL
    - DOGE
    - XRP
    - ADA
    - DOT
    - AVAX
    - LINK
    - MATIC
