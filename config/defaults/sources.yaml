  - name: reuters_business
    url: https://feeds.reuters.com/reuters/businessNews
    category: macro
    priority: 9
    modes: [general, positions]
    enabled: true   # Reuters global business & markets wire

  - name: ap_business
    url: https://feeds.apnews.com/rss/business
