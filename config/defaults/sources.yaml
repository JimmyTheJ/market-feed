# Market Pipeline - News Sources Configuration
# Curated RSS feeds — all URLs live-tested and verified working.
# Last audited: 2026-05-01
#
# Categories: crypto | macro | equities | fixed_income | energy | commodities | healthcare | ev_tesla | technology | international
# Priority: 9=essential  8=high  7=standard  6=supplemental
#
# modes: which pipeline modes include this source
#   [general, positions] — used in both General Market Update and Position Analysis runs
#   [positions]          — position-specific niche sources, Position Analysis only

rss:

