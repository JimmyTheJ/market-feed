    priority: 9
    enabled: true

  - name: cointelegraph
    url: https://cointelegraph.com/rss
    category: crypto
    priority: 8
    enabled: true

  - name: bitcoin_magazine
    url: https://bitcoinmagazine.com/.rss/full/
